mixed-port: 7890
allow-lan: true
bind-address: "*"
mode: rule
log-level: info
ipv6: false
unified-delay: true
tcp-concurrent: true
global-client-fingerprint: chrome

profile:
  store-selected: true
  store-fake-ip: true

sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  force-domain:
    - "+.v2ex.com"
  skip-domain:
    - "+.push.apple.com"

tun:
  enable: true
  stack: mixed
  dns-hijack:
    - any:53
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true

dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  respect-rules: true
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  fallback:
    - https://cloudflare-dns.com/dns-query
    - https://dns.google/dns-query

proxies: []

proxy-groups:
  - name: 🚀 节点选择
    type: select
    proxies: []
  - name: 🤖 AI网站
    type: select
    proxies: []
  - name: 🎬 媒体解锁
    type: select
    proxies: []
  - name: 🐟 漏网之鱼
    type: select
    proxies:
      - 🚀 节点选择
      - DIRECT
  - name: ♻️ 自动选择
    type: url-test
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    proxies: []
  - name: 🛑 广告拦截
    type: select
    proxies:
      - REJECT
      - DIRECT
  - name: 🌐 全部节点
    type: select
    proxies: []

rules:
  - RULE-SET,private,DIRECT
  - RULE-SET,reject,🛑 广告拦截
  - RULE-SET,my_direct,DIRECT
  - RULE-SET,my_proxy,🚀 节点选择
  - RULE-SET,ai,🤖 AI网站
  - RULE-SET,youtube,🎬 媒体解锁
  - RULE-SET,google,🚀 节点选择
  - RULE-SET,github,🚀 节点选择
  - RULE-SET,telegram,🚀 节点选择
  - RULE-SET,cn,DIRECT
  - GEOIP,CN,DIRECT
  - MATCH,🐟 漏网之鱼

rule-providers:
  my_proxy:
    type: http
    behavior: classical
    format: text
    url: http://localhost:3000/rules/proxy.list
    path: ./ruleset/my_proxy.list
    interval: 86400
  my_direct:
    type: http
    behavior: classical
    format: text
    url: http://localhost:3000/rules/direct.list
    path: ./ruleset/my_direct.list
    interval: 86400
  private:
    type: http
    behavior: domain
    format: mrs
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/private.mrs
    path: ./ruleset/private.mrs
    interval: 86400
  reject:
    type: http
    behavior: domain
    format: mrs
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/category-ads-all.mrs
    path: ./ruleset/reject.mrs
    interval: 86400
  ai:
    type: http
    behavior: domain
    format: mrs
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/category-ai-!cn.mrs
    path: ./ruleset/ai.mrs
    interval: 86400
  youtube:
    type: http
    behavior: domain
    format: mrs
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/youtube.mrs
    path: ./ruleset/youtube.mrs
    interval: 86400
  google:
    type: http
    behavior: domain
    format: mrs
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/google.mrs
    path: ./ruleset/google.mrs
    interval: 86400
  github:
    type: http
    behavior: domain
    format: mrs
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/github.mrs
    path: ./ruleset/github.mrs
    interval: 86400
  telegram:
    type: http
    behavior: domain
    format: mrs
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/telegram.mrs
    path: ./ruleset/telegram.mrs
    interval: 86400
  cn:
    type: http
    behavior: domain
    format: mrs
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/cn.mrs
    path: ./ruleset/cn.mrs
    interval: 86400
