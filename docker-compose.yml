services:
  clash-sub-manager:
    build: .
    container_name: clash-sub-manager
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:?set a strong admin password}"
      SESSION_SECRET: "${SESSION_SECRET:?set a long random session secret}"
      SUB_TOKEN: "${SUB_TOKEN:?set a long random subscription token}"
      BASE_URL: "${BASE_URL:-http://localhost:3000}"
      DATABASE_PATH: "/app/data/app.db"
    volumes:
      - ./data:/app/data
